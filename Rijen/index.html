<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-800 text-white flex flex-col min-h-screen">

    <header class="bg-gray-900 text-white p-4">
        <h1 class="text-4xl text-center">Fakt nevim!</h1>
    </header>

    <main class="p-4 flex-grow flex items-center">
        <section class="max-w-2xl mx-auto text-center">
            <h2 class="text-2xl mb-4">Webserver v docker kontejneru</h2>
            <p class="mb-4">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Architecto odio optio recusandae omnis voluptatem ea rerum exercitationem reiciendis sunt porro.</p>
            <div class="mt-4">
                <p>Aktuální čas: <span id="liveTime" class="font-bold"></span></p>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white p-4 mt-auto">
        <p class="text-center">&copy; <span id="currentYear"></span>  Next LABS</p>
    </footer>

    <script>
        const liveTimeElement = document.getElementById('liveTime');
        const currentYearElement = document.getElementById('currentYear');

        function updateTimeAndYear() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':'
                + now.getMinutes().toString().padStart(2, '0') + ':'
                + now.getSeconds().toString().padStart(2, '0');
            liveTimeElement.textContent = timeString;
            currentYearElement.textContent = now.getFullYear();
        }

        setInterval(updateTimeAndYear, 1000);
        updateTimeAndYear();
    </script>

</body>
</html>
